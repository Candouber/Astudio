# Copy this file to data/config.yaml, then fill in the providers you want to use.
# You can also configure providers from the AStudio settings UI after startup.

llm_providers:
  - name: openai
    api_key: ""
    endpoint: null
    models:
      - gpt-4o
      - gpt-4o-mini
    # Optional. Local model name -> actual model name under this LiteLLM provider.
    # Useful for OpenAI-compatible gateways whose public model id is long or provider-specific.
    # Example:
    # model_aliases:
    #   qwen-max: Qwen/Qwen3-235B-A22B-Instruct-2507
    model_aliases: {}
    # Optional. UI/task records use these names, LiteLLM calls still use the real model id.
    model_display_names: {}
    is_oauth: false
    # Optional. If this provider is an OpenAI-compatible gateway, keep name as your display id
    # and set litellm_provider: openai.
    litellm_provider: null

  - name: anthropic
    api_key: ""
    endpoint: null
    models:
      - claude-3-5-sonnet-20240620
      - claude-3-haiku-20240307
    model_aliases: {}
    model_display_names: {}
    is_oauth: false
    litellm_provider: null

  - name: deepseek
    api_key: ""
    endpoint: null
    models:
      - deepseek-chat
      - deepseek-coder
    model_aliases: {}
    model_display_names: {}
    is_oauth: false
    litellm_provider: null

  - name: ollama
    api_key: null
    endpoint: http://localhost:11434
    models: []
    model_aliases: {}
    model_display_names: {}
    is_oauth: false
    litellm_provider: null

  # OAuth providers do not use API keys. Configure them in the settings UI.
  - name: chatgpt
    api_key: null
    endpoint: null
    models:
      - chatgpt/gpt-5.4
      - chatgpt/codex-latest
    model_aliases: {}
    model_display_names: {}
    is_oauth: true

  - name: github_copilot
    api_key: null
    endpoint: null
    models:
      - github_copilot/claude-sonnet-4-5
      - github_copilot/gpt-4o
    model_aliases: {}
    model_display_names: {}
    is_oauth: true

  # OpenAI-compatible gateway example:
  # - name: siliconflow
  #   litellm_provider: openai
  #   api_key: "sk-..."
  #   endpoint: "https://api.siliconflow.cn/v1"
  #   models:
  #     - qwen-max
  #   model_aliases:
  #     qwen-max: Qwen/Qwen3-235B-A22B-Instruct-2507
  #   model_display_names:
  #     qwen-max: "Qwen Max (SiliconFlow)"
  #   is_oauth: false

model_assignment:
  agent_zero:
    model: gpt-4o
    reasoning_effort: high
    thinking_type: default
    thinking_budget_tokens: null
  sub_agents:
    model: gpt-4o-mini
    reasoning_effort: low
    thinking_type: default
    thinking_budget_tokens: null
  distillation:
    model: gpt-4o-mini
    reasoning_effort: default
    thinking_type: default
    thinking_budget_tokens: null

web_search:
  # Supported values: duckduckgo, brave, tavily, searxng, jina
  provider: duckduckgo
  api_key: ""
  # Required for searxng, for example: http://localhost:8080
  base_url: ""
  max_results: 5
  # Optional HTTP/SOCKS proxy, for example: http://127.0.0.1:7890
  proxy: null
